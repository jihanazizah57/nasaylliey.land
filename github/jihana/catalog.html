
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Blooming Bouquet</title>
<style>
body{font-family:Arial;background:#fff0f5;padding:20px}
h1{text-align:center;color:#ff4f81}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:white;padding:15px;border-radius:15px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
img{width:100%;height:220px;object-fit:cover;border-radius:10px}
</style>
</head>
<body>
<h1>Blooming Bouquet Catalog</h1>
<div class="grid">
<div class="card"><img src="images/fresh-flower.jpg"><h3>Fresh Flower Bouquet</h3></div>
<div class="card"><img src="images/satin-bouquet.jpg"><h3>Satin Bouquet</h3></div>
<div class="card"><img src="images/snack-bouquet.jpg"><h3>Snack Bouquet</h3></div>
<div class="card"><img src="images/artificial-bouquet.jpg"><h3>Artificial Bouquet</h3></div>
<div class="card"><img src="images/money-bouquet.jpg"><h3>Money Bouquet</h3></div>
<div class="card"><img src="images/hand-bouquet.jpg"><h3>Hand Bouquet</h3></div>
</div>
</body>
</html>
