<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Bloom Bouquet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <span class="back-link">Bloom Bouquet</span>
            <h1>Sign Up</h1>
            <p>Daftar akun baru untuk login ke website.</p>

            <form id="registerForm">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username baru" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Masukkan email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" required>

                <button type="submit">Daftar</button>
            </form>

            <p id="message"></p>
            <p class="helper">Sudah punya akun? <a href="index.html">Login di sini</a></p>
        </section>
    </main>

    <script src="js/register.js" defer></script>
</body>
</html>
